version: "3.8"
services:  #here servizi da avviare


  fastapi:
    build:
      #directory di contesto per la build è la root del progetto
      context: .
      dockerfile: docker/fastapi.Dockerfile
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      SQLSERVER_HOST: "sqlserver"
      SQLSERVER_PORT: "1433"
      SQLSERVER_DB: "RAGChat"
      QDRANT_URL: "http://qdrant:6333"
      BASE_URL_OLLAMA: "http://ollama:11434"
    #partira solo dopo questi VENGONO AVVIATI(non significa che sono pronti ready e operativi)
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  celery-worker-high:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    container_name: celery-worker-high
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=tenant.*.high,shared_cleanup
      --concurrency=4
      --prefetch-multiplier=1
      --loglevel=info
      --hostname=worker-high@%h
    env_file: .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      SQLSERVER_HOST: "sqlserver"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app.celery_app", "inspect", "ping", "-d", "worker-high@%h"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # CELERY — coda DEFAULT (ingestion bulk)
  # ─────────────────────────────────────────────
  celery-worker-default:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    container_name: celery-worker-default
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=tenant.*.default,default
      --concurrency=2
      --prefetch-multiplier=1
      --loglevel=info
      --hostname=worker-default@%h
    env_file: .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      SQLSERVER_HOST: "sqlserver"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started

  # ─────────────────────────────────────────────
  # CELERY BEAT — scheduler task periodici
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    container_name: celery-beat
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app.celery_app beat
      --loglevel=info
      --scheduler redbeat.RedBeatScheduler
    env_file: .env
    environment:
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - redis

  # ─────────────────────────────────────────────
  # FLOWER — monitoring Celery (dev/staging)
  # ─────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: flower
    restart: unless-stopped
    command: >
      celery
      --broker=redis://redis:6379/0
      flower
      --port=5555
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis


  qdrant:
    image: qdrant/qdrant:v1.4.2
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: "INFO"
      # in production: abilita API key
      # QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # REDIS — broker Celery + cache + sessioni
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.0-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # SQL SERVER — storage relazionale multi-tenant
  # ─────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./docker/sqlserver/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/sqlserver/entrypoint.sh:/init/entrypoint.sh:ro
    environment:
      SA_PASSWORD: "${SQLSERVER_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"          # gratis per dev; "Standard"/"Enterprise" in prod
      MSSQL_COLLATION: "Latin1_General_100_CI_AS_SC_UTF8"
      MSSQL_MEMORY_LIMIT_MB: 2048     # cap RAM del container
    command: >
      /bin/bash -c "
      /opt/mssql/bin/sqlservr &
      sleep 30 &&
      /init/entrypoint.sh &&
      wait"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd",
             "-S", "localhost",
             "-U", "SA",
             "-P", "${SQLSERVER_PASSWORD}",
             "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# ─────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────
volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  sqlserver_data:
    driver: local
