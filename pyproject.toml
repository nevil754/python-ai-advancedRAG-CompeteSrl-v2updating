# =============================================================
# RAG Enterprise Legal — configurazione tool di sviluppo

# quando esegui Ruff → usa queste regole linter + formatter (sostituisce black + isort + flake8)
# quando esegui Mypy → usa queste regole type checking statico
# quando esegui Pytest → usa queste regole configurazione test
# =============================================================

[tool.ruff]
target-version = "py311"
line-length = 100
indent-width = 4

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
]
ignore = [
    "B008",  # do not perform function calls in default arguments (FastAPI Depends)
    "N805",  # first argument of a method should be named `self` (Pydantic validators)
    "E501",  # line too long — gestito da formatter
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = false                  # strict = true quando il codebase è maturo
ignore_missing_imports = true   # molte librerie AI non hanno stub completi
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = false   # da attivare gradualmente

[[tool.mypy.overrides]]
module = ["langchain.*", "langchain_community.*", "langgraph.*", "qdrant_client.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"           # tutti i test async usano pytest-asyncio
addopts = [
    "--strict-markers",
    "--tb=short",
    "-v",
]
markers = [
    "unit: test unitari veloci, nessuna dipendenza esterna",
    "integration: test di integrazione, richiedono DB e Redis",
    "e2e: test end-to-end, richiedono l'intera infrastruttura",
    "slow: test lenti (embedding, ingestion completa)",
]
