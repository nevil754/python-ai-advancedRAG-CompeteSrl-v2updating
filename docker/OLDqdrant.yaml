version: "3.8"
services:
  qdrant:  #nome db vettoriale
    image: qdrant/qdrant:v1.4.2  #questa version va bene, scegliena una e usala sempre
    container_name: qdrant
    restart: unless-stopped  #riavviato sempre automaticamente, a meno che non lo fermi tu intenzionalmente
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage   #monta volume called 'qdrant_data' in path /qdrant/storage del container, dove qdrant salva i dati (persistence)
    environment:  #env vars
      QDRANT__SERVICE__GRPC_PORT: 6334  #porta grpc di qdrant
      QDRANT__SERVICE__HTTP_PORT: 6333  #porta http di qdrant

volumes:
  qdrant_data: