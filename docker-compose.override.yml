#questo file docker-compose.override.yml VIENE SEMPRE CARICATO quando fai 'docker-compose up', e QUESTI SETTINGS OVERRIDE QUELLI DI BASE se matchano

version: "3.8"
# =============================================================
# Override per sviluppo locale
# Docker Compose carica questo file AUTOMATICAMENTE insieme
# a docker-compose.yml quando fai: docker-compose up
# Le chiavi qui SOVRASCRIVONO o ESTENDONO quelle del file base
# In produzione NON viene usato (si usa: docker-compose -f docker-compose.yml up), mentre in sviluppo si fa anche solo 'docker-compose up'
# =============================================================
 
services:
 
  fastapi:
    # Hot reload: uvicorn rileva modifiche ai .py e si riavvia automaticamente
    # In produzione NON vuoi questo, rallenta e consuma più CPU
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
      --reload-dir /app/config
      --log-level debug
    environment:
      # Sovrascrive environment del docker-compose.yml base
      APP_ENVIRONMENT: "development"
      APP_DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    volumes:
      #Monta codice sorgente LIVE nel container
      #Ogni modifica al codice è visibile SUBITO senza rebuild
      - ./app:/app/app          #codice Python
      - ./config:/app/config    #yaml config
      - ./main.py:/app/main.py  #entry point
    #in dev apriamo anche porta debug se usi debugger remoto (es. VS Code attach)
    ports:
      - "8000:8000"
      - "5678:5678"   # debugpy — VS Code remote debugger (opzionale)
 
  celery-worker-high:
    # In dev: meno concurrency, log più verbosi
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=high,shared_cleanup
      --concurrency=1
      --prefetch-multiplier=1
      --loglevel=debug
      --hostname=worker-high@%h
    environment:
      APP_ENVIRONMENT: "development"
      LOG_LEVEL: "DEBUG"
    volumes:
      - ./app:/app/app
      - ./config:/app/config
 
  celery-worker-default:
    command: >
      celery -A app.workers.celery_app.celery_app worker
      --queues=default,low
      --concurrency=1
      --prefetch-multiplier=1
      --loglevel=debug
      --hostname=worker-default@%h
    environment:
      APP_ENVIRONMENT: "development"
      LOG_LEVEL: "DEBUG"
    volumes:
      - ./app:/app/app
      - ./config:/app/config
 
  celery-beat:
    environment:
      APP_ENVIRONMENT: "development"
    volumes:
      - ./app:/app/app
      - ./config:/app/config
 
  qdrant:
    # In dev: esponi anche la porta gRPC per tool esterni (es. Qdrant Web UI)
    # e abbassa log level per non sporcare il terminale
    environment:
      QDRANT__LOG_LEVEL: "WARN"   # meno rumore in dev
    ports:
      - "6333:6333"
      - "6334:6334"
 
  redis:
    # In dev: niente password per semplicità
    # Sovrascrive il command del file base che usa --requirepass
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --loglevel warning
    # ATTENZIONE: rimuoviamo --requirepass in dev
    # Quindi REDIS_URL nei servizi deve essere senza password:
    # redis://redis:6379/0  (non redis://:password@redis:6379/0)
    environment:
      REDIS_PASSWORD: ""
 
  sqlserver:
    environment:
      # In dev usa meno RAM
      MSSQL_MEMORY_LIMIT_MB: 1024

      